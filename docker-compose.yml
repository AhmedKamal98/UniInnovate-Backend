version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: uniinnovate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: uniinnovate
      POSTGRES_PASSWORD: uniinnovate
      POSTGRES_DB: uniinnovate
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: uniinnovate-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: uniinnovate-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
